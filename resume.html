<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Resume — Cyrah Fajardo | Build With Cy</title>
<meta name="description" content="Resume of Cyrah Fajardo — Shopify Developer and Full Stack Builder. View or download Cyrah's resume."/>
<meta name="author" content="Cyrah Fajardo"/>
<link rel="icon" type="image/x-icon" href="/favicon.ico"/>
<link rel="canonical" href="https://buildwithcy.com/resume"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --y:#F5C400;--y-dk:#C99F00;--dk:#080808;--dk2:#111111;
  --iv:#FFFDF7;--lt-bd:#DDD8CD;--tx-l:#151515;--tx-lm:#595959;
  --tx-ls:#8A8680;--tx-d:#F0F0EC;--tx-dm:#C8C8C8;--tx-ds:#888880;
  --r:4px;
}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--dk);color:var(--tx-d);
  min-height:100vh;display:flex;flex-direction:column;
}

/* ── NAV ─────────────────────────────────────────────────── */
nav{
  position:sticky;top:0;z-index:100;
  background:rgba(8,8,8,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,.07);
  padding:0 clamp(20px,5vw,64px);
  display:flex;align-items:center;justify-content:space-between;
  height:64px;
}
.nav-logo{
  font-family:'Bebas Neue',sans-serif;font-size:22px;
  color:var(--tx-d);text-decoration:none;letter-spacing:2px;
}
.nav-logo span{color:var(--y)}
.nav-actions{display:flex;align-items:center;gap:12px}
.btn-dl{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 20px;border-radius:var(--r);
  background:var(--y);color:var(--dk);
  font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  text-decoration:none;transition:background .2s;border:none;cursor:pointer;
}
.btn-dl:hover{background:var(--y-dk)}
.btn-back{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13px;color:var(--tx-ds);text-decoration:none;
  transition:color .2s;letter-spacing:.5px;
}
.btn-back:hover{color:var(--tx-d)}
.btn-back svg{width:14px;height:14px}

/* ── HEADER ──────────────────────────────────────────────── */
.resume-header{
  padding:40px clamp(20px,5vw,64px) 28px;
  border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:flex-end;justify-content:space-between;
  flex-wrap:wrap;gap:16px;
}
.resume-title-block{}
.resume-eye{
  font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--y);margin-bottom:8px;
}
.resume-name{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,5vw,52px);
  color:var(--tx-d);letter-spacing:2px;line-height:1;
}
.resume-role{
  font-size:14px;color:var(--tx-ds);margin-top:6px;letter-spacing:.5px;
}
.resume-meta{
  display:flex;gap:20px;flex-wrap:wrap;
}
.resume-meta a{
  font-size:13px;color:var(--tx-ds);text-decoration:none;
  display:flex;align-items:center;gap:6px;transition:color .2s;
}
.resume-meta a:hover{color:var(--y)}
.resume-meta svg{width:14px;height:14px;flex-shrink:0}

/* ── PDF VIEWER ──────────────────────────────────────────── */
.viewer-wrap{
  flex:1;padding:32px clamp(20px,5vw,64px);
  display:flex;flex-direction:column;gap:16px;
}
.viewer-note{
  font-size:13px;color:var(--tx-ds);text-align:center;
}
.viewer-note a{color:var(--y);text-decoration:none}
.viewer-note a:hover{text-decoration:underline}
.pdf-frame{
  width:100%;flex:1;min-height:80vh;
  border:1px solid rgba(255,255,255,.08);
  border-radius:6px;overflow:hidden;
  background:#1a1a1a;
}
.pdf-frame iframe{
  width:100%;height:100%;min-height:80vh;
  border:none;display:block;
}

/* ── FOOTER ──────────────────────────────────────────────── */
footer{
  border-top:1px solid rgba(255,255,255,.07);
  padding:20px clamp(20px,5vw,64px);
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:12px;
}
.footer-copy{font-size:12px;color:var(--tx-ds)}
.footer-links{display:flex;gap:20px}
.footer-links a{font-size:12px;color:var(--tx-ds);text-decoration:none;transition:color .2s}
.footer-links a:hover{color:var(--tx-d)}

@media(max-width:600px){
  .resume-header{flex-direction:column;align-items:flex-start}
  .pdf-frame,.pdf-frame iframe{min-height:60vh}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/" class="nav-logo">BUILD WITH <span>CY</span></a>

    <a href="/" class="btn-back">

  </p>
  <div class="pdf-frame">
    <iframe
      src="resume.pdf"
      title="Cyrah Fajardo Resume"

  </div>

<!-- FOOTER -->
<footer>
  <span class="footer-copy">© 2025 Cyrah Fajardo · Build With Cy</span>
  <div class="footer-links">

</body>
