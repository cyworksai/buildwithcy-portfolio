[build]
  publish = "."

[[redirects]]
  from = "/resume"
  to = "https://drive.google.com/file/d/1SoRROMxg1qPicOiPGrEidkPm0mqZtcCr/view"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
